name: Keep Supabase Alive

on:
  schedule:
    # 每 3 天 UTC 8:00 运行（北京时间 16:00）
    - cron: '0 8 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}" \
            "https://rdmrplrlyojwugcxbqmj.supabase.co/rest/v1/items?limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          echo " — Supabase is alive ✅"
